services:
  proxy:
    build:
      context: ../..
      dockerfile: tests/integration/docker/proxy/Dockerfile
    volumes:
      # elhaz daemon socket from the host — proxy calls elhaz export through this
      - ${ELHAZ_SOCK:-~/.elhaz/sock/daemon.sock}:/tmp/elhaz.sock:ro
      # elhaz configs from the host — tells the proxy which role to assume
      - ${ELHAZ_CONFIG_DIR:-~/.elhaz/configs}:/root/.elhaz/configs:ro
      # shared volume: proxy writes creds.sock and actions.log here, agent reads them
      - proxy-run:/run/proxy
      # CA cert persisted across restarts so the agent trusts it
      - proxy-ca:/run/proxy/ca
    environment:
      ELHAZ_CONFIG_NAME: ${ELHAZ_CONFIG_NAME:-sandbox-elhaz}
      ELHAZ_SOCKET_PATH: /tmp/elhaz.sock
      PROXY_SOCK_PATH: /run/proxy/creds.sock
      ACTION_LOG_PATH: /run/proxy/actions.log
    ports:
      - "8080:8080"
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "python", "-c",
        "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080)); s.close()"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: ../..
      dockerfile: tests/integration/docker/agent/Dockerfile
    depends_on:
      proxy:
        condition: service_healthy
    volumes:
      # creds.sock and actions.log — no elhaz socket, no IAC credentials
      - proxy-run:/run/proxy:ro
      # CA cert so the agent trusts the proxy's TLS interception
      - proxy-ca:/run/proxy/ca:ro
    environment:
      AWS_PROFILE: proxy
      AWS_CA_BUNDLE: /run/proxy/ca/ca.pem
      HTTPS_PROXY: http://proxy:8080
      HTTP_PROXY: http://proxy:8080
      PROXY_SOCK_PATH: /run/proxy/creds.sock
      ACTION_LOG_PATH: /run/proxy/actions.log
    networks:
      - proxy-net
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

networks:
  proxy-net:
    driver: bridge

volumes:
  proxy-run:
  proxy-ca:
